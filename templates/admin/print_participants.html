<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Print Participants - {{ event.title }}</title>
    <style>
        body { font-family: sans-serif; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h1>{{ event.title }} - Participants</h1>
    <p>{{ event.event_date.strftime('%B %d, %Y') }}</p>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for reg in registrations %}
            <tr>
                <td>{{ reg.full_name or '-' }}</td>
                <td>{{ reg.email }}</td>
                <td>{{ reg.status.title() }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
