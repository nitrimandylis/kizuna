{% extends "base.html" %}

{% block title %}Register for {{ event.title }} - Kizuna{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Register for {{ event.title }}</h1>
                <p>Fill out the form below to register for this event.</p>
            </div>

            <form method="POST" action="{{ url_for('events.register', event_id=event.id) }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                
                <div class="form-group">
                    <label class="form-label" for="full_name">Full Name</label>
                    <input type="text" id="full_name" name="full_name" class="form-input" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-input" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="status">Status</label>
                    <select id="status" name="status" class="form-input" required>
                        <option value="confirmed">Confirmed</option>
                        <option value="maybe">Maybe</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary btn-full btn-lg">Register</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
